# The server auto-loads config/providers.local.yaml when present.
# Copy this file to providers.local.yaml and paste your real keys there.
AzureSpeechTTS:
  type: azure_speech_tts
  endpoint: https://eastasia.tts.speech.microsoft.com/cognitiveservices/v1
  region: eastasia
  api_key: your-azure-speech-key
  voice: en-US-JennyNeural
  sample_rate: 24000

GoogleCloudTTS:
  type: google_cloud_tts
  endpoint: https://texttospeech.googleapis.com/v1beta1/text:synthesize
  service_account_file: /absolute/path/to/google-service-account.json
  service_account_json:
  access_token:
  api_key:
  voice:
  sample_rate: 24000
  speaking_rate:
  pitch:

DoubaoStreamTTS:
  type: doubao_stream
  ws_url: wss://openspeech.bytedance.com/api/v3/tts/bidirection
  appid: "your-app-id"
  access_token: "your-access-token"
  resource_id: volc.service_type.10029
  speaker: zh_female_wanwanxiaohe_moon_bigtts
  sample_rate: 16000
