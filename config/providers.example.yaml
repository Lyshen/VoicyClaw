# The server auto-loads config/providers.local.yaml when present.
# Copy this file to providers.local.yaml and paste your real keys there.
AzureSpeechTTS:
  type: azure_speech_tts
  endpoint: https://eastasia.tts.speech.microsoft.com/cognitiveservices/v1
  region: eastasia
  api_key: your-azure-speech-key
  voice: en-US-AriaNeural
  sample_rate: 24000
  style: chat
  rate: +4%
  pitch:
  volume:
  role:
  style_degree:

AzureSpeechStreamingTTS:
  type: azure_speech_streaming_tts
  # Credentials fall back to AzureSpeechTTS when omitted.
  endpoint:
  region:
  api_key:
  voice: en-US-AriaNeural
  sample_rate: 24000
  style: chat
  rate: +4%
  pitch:
  volume:
  role:
  style_degree:
  flush_timeout_ms: 450
  max_chunk_characters: 220

GoogleCloudTTS:
  type: google_cloud_tts
  endpoint: texttospeech.googleapis.com
