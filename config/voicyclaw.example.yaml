# VoicyClaw reads this file first when present:
#   config/voicyclaw.local.yaml
#
# Keep app/runtime settings and provider keys in this single file so one config
# can boot the web app, server, and demo bot together.

App:
  server_port: 3001
  web_port: 3000
  public_server_url:
  public_server_port:
  server_url: http://127.0.0.1:3001
  default_channel_id: voice-room
  default_channel_name: Voice Room

Auth:
  mode: local
  clerk_publishable_key:
  clerk_secret_key:

Storage:
  driver: sqlite
  sqlite_file: ./apps/server/.data/voicyclaw.sqlite
  mysql_url:
  mysql_pool_size: 10

DemoBot:
  server_url: http://127.0.0.1:3001
  channel_id: voice-room
  bot_id: demo-clawbot
  bot_name: Studio Claw
  bot_api_key:

AzureSpeechTTS:
  type: azure_speech_tts
  endpoint: https://eastasia.tts.speech.microsoft.com/cognitiveservices/v1
  region: eastasia
  api_key: your-azure-speech-key
  voice: en-US-AriaNeural
  sample_rate: 24000
  style: chat
  rate: +4%
  pitch:
  volume:
  role:
  style_degree:

AzureSpeechStreamingTTS:
  type: azure_speech_streaming_tts
  endpoint:
  region:
  api_key:
  voice: en-US-AriaNeural
  sample_rate: 24000
  style: chat
  rate: +4%
  pitch:
  volume:
  role:
  style_degree:
  flush_timeout_ms: 450
  max_chunk_characters: 220

GoogleCloudTTS:
  type: google_cloud_tts
  endpoint: texttospeech.googleapis.com
  service_account_file: /absolute/path/to/google-service-account.json
  service_account_json:
  voice: en-US-Chirp3-HD-Leda
  sample_rate: 24000
  speaking_rate:

GoogleCloudBatchedTTS:
  type: google_cloud_tts_batched
  endpoint: texttospeech.googleapis.com
  service_account_file: /absolute/path/to/google-service-account.json
  service_account_json:
  voice: en-US-Neural2-F
  sample_rate: 24000
  speaking_rate:
  pitch:
  flush_timeout_ms: 450
  max_chunk_characters: 220

TencentCloudTTS:
  type: tencent_cloud_tts
  endpoint: wss://tts.cloud.tencent.com/stream_ws
  app_id: "your-app-id"
  secret_id: "your-secret-id"
  secret_key: "your-secret-key"
  voice_type: 502001
  fast_voice_type:
  sample_rate: 16000
  codec: pcm
  speed:
  volume:
  enable_subtitle: false
  emotion_category:
  emotion_intensity:
  segment_rate:

TencentCloudStreamingTTS:
  type: tencent_cloud_streaming_tts
  endpoint: wss://tts.cloud.tencent.com/stream_wsv2
  app_id:
  secret_id:
  secret_key:
  voice_type: 502001
  fast_voice_type:
  sample_rate: 24000
  codec: pcm
  speed:
  volume:
  enable_subtitle: false

DoubaoStreamTTS:
  type: doubao_stream
  ws_url: wss://openspeech.bytedance.com/api/v3/tts/bidirection
  appid: "your-app-id"
  access_token: "your-access-token"
  model: seed-tts-2.0-standard
  resource_id: volc.service_type.10029
  speaker: zh_female_wanwanxiaohe_moon_bigtts
  sample_rate: 16000
